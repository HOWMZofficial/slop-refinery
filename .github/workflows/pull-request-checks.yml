name: Pull Request Checks

on:
    pull_request:

permissions:
    contents: read

concurrency:
    cancel-in-progress: true
    group: pull-request-checks-${{ github.event.pull_request.number || github.ref }}

jobs:
    checks:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  cache: npm
                  node-version: 24

            - name: Install dependencies
              run: npm ci

            - name: Run format
              run: npm run format

            - name: Verify formatting produced no changes
              run: git diff --exit-code

            - name: Run lint
              run: npm run lint

            - name: Run typecheck
              run: npm run typecheck

            - name: Run tests
              run: npm test
